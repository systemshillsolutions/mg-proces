<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procesní mapy – Metal Granit</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green:       #3aaa35;
    --green-dark:  #2d8829;
    --green-pale:  #e8f5e7;
    --nav:         #2a2a2a;
    --nav-mid:     #3a3a3a;
    --bg:          #f4f4f2;
    --white:       #ffffff;
    --text:        #1e1e1e;
    --text-mid:    #444444;
    --text-light:  #777777;
    --text-pale:   #aaaaaa;
    --border:      #d8d8d4;
    --border-light:#ebebea;
    --warn-bg:     #fff8f0;
    --warn-border: #f0d090;

    /* phase accent stripes — civilní zakázka */
    --ph1: #3aaa35;
    --ph2: #4a7fa8;
    --ph3: #9a7a3a;
    --ph4: #a84a4a;
    --ph5: #5a5a9a;

    /* phase accent stripes — drobná zakázka */
    --dph1: #2a8a7a;
    --dph2: #7a5aaa;
    --dph3: #aa6a3a;
    --dph4: #4a8a4a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 16px;
    line-height: 1.55;
    min-height: 100vh;
  }

  /* ══════════════════════════
     TOP UTILITY BAR
  ══════════════════════════ */
  .util-bar {
    background: #1a1a1a;
    padding: 6px 48px;
    display: flex;
    justify-content: flex-end;
    gap: 24px;
    font-size: 13px;
    color: #888;
    font-weight: 400;
    letter-spacing: 0.5px;
  }

  /* ══════════════════════════
     NAV BAR
  ══════════════════════════ */
  .navbar {
    background: var(--nav);
    display: flex;
    align-items: stretch;
    min-height: 62px;
  }
  .nav-logo-block {
    background: var(--green);
    padding: 10px 20px 10px 24px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    min-width: 170px;
  }
  .logo-text {
    font-family: 'Libre Baskerville', serif;
    color: white;
    line-height: 1.15;
  }
  .logo-text .small { font-size: 11px; font-weight: 400; letter-spacing: 0.5px; display: block; }
  .logo-text .big   { font-size: 17px; font-weight: 700; display: block; letter-spacing: 0.5px; }

  /* ── Process Tabs ── */
  .nav-tabs {
    display: flex;
    align-items: stretch;
    gap: 0;
    margin-left: 0;
  }
  .nav-tab {
    display: flex;
    align-items: center;
    padding: 0 28px;
    font-size: 14px;
    color: #888;
    letter-spacing: 0.5px;
    font-weight: 400;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s ease;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'Source Sans 3', sans-serif;
    white-space: nowrap;
    position: relative;
  }
  .nav-tab:hover {
    color: #ccc;
    background: rgba(255,255,255,0.04);
  }
  .nav-tab.active {
    color: #fff;
    border-bottom-color: var(--green);
    font-weight: 500;
  }
  .nav-tab .tab-icon {
    margin-right: 8px;
    font-size: 16px;
    opacity: 0.7;
  }
  .nav-tab.active .tab-icon {
    opacity: 1;
  }
  .nav-tab-divider {
    width: 1px;
    background: #3a3a3a;
    align-self: stretch;
    margin: 14px 0;
  }

  .nav-right {
    display: flex;
    align-items: center;
    padding: 0 32px;
    margin-left: auto;
    gap: 6px;
  }
  .nav-doc-label {
    font-size: 13px;
    color: #888;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 300;
  }
  .nav-doc-label strong { color: #bbb; font-weight: 500; }

  /* ══════════════════════════
     HEADER
  ══════════════════════════ */
  header {
    background: var(--white);
    border-bottom: 4px solid var(--green);
    padding: 44px 56px 36px;
    transition: border-color 0.3s;
  }
  .header-inner {
    max-width: 1320px;
    margin: 0 auto;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 40px;
    flex-wrap: wrap;
  }
  .header-left {}
  .header-eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-eyebrow::before {
    content: '';
    width: 28px; height: 2px;
    background: var(--green);
    display: inline-block;
  }
  h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: clamp(26px, 3.5vw, 42px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 10px;
  }
  h1 em { font-style: italic; color: var(--green-dark); }
  .header-sub {
    font-size: 16px;
    color: var(--text-light);
    font-weight: 300;
    letter-spacing: 0.2px;
  }

  .header-logo {
    flex-shrink: 0;
    opacity: 0.18;
    width: 140px;
    margin-top: -8px;
  }

  .phase-legend {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-start;
    padding-top: 4px;
  }
  .legend-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-pale);
    margin-bottom: 4px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--text-mid);
    font-weight: 400;
  }
  .legend-pip {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ══════════════════════════
     MAIN CANVAS
  ══════════════════════════ */
  main {
    max-width: 1320px;
    margin: 0 auto;
    padding: 52px 56px 72px;
  }

  /* ── Responsible person badge ── */
  .person-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
    background: #f0e8f8;
    color: #6a4a9a;
    border: 1px solid #d8c8e8;
    margin-top: 6px;
  }
  .person-badge.katka { background: #e8f0f8; color: #3a6a9a; border-color: #c0d4e8; }
  .person-badge.lenka { background: #f8e8f0; color: #9a3a6a; border-color: #e8c0d4; }
  .person-badge.adam  { background: #e8f8f0; color: #3a9a6a; border-color: #c0e8d4; }
  .person-badge.ivo   { background: #f8f0e8; color: #9a6a3a; border-color: #e8d4c0; }
  .person-badge.simona { background: #f0f0f8; color: #5a5a9a; border-color: #d0d0e8; }

  /* ── Phase Block ── */
  .phase-block { margin-bottom: 56px; }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 6px;
  }
  .phase-num-badge {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Libre Baskerville', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--white);
    flex-shrink: 0;
  }
  .phase-titles { flex: 1; }
  .phase-name {
    font-family: 'Libre Baskerville', serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .phase-sub {
    font-size: 13px;
    color: var(--text-pale);
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .phase-divider {
    height: 2px;
    background: var(--border-light);
    margin: 14px 0 22px;
    position: relative;
  }
  .phase-divider::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 80px;
  }

  /* ── Flow Row ── */
  .flow-row {
    display: flex;
    align-items: stretch;
    flex-wrap: wrap;
    gap: 0;
    row-gap: 14px;
  }

  /* ── Step Card ── */
  .step-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-top: 4px solid var(--border);
    border-radius: 3px;
    padding: 18px 20px 16px;
    width: 210px;
    min-width: 190px;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.18s ease;
    position: relative;
  }
  .step-card:hover {
    box-shadow: 0 6px 20px rgba(0,0,0,0.10);
    transform: translateY(-3px);
    z-index: 5;
  }
  .step-card.sub-card {
    background: #fafaf8;
    border-style: dashed;
    border-top-style: solid;
    width: 195px;
    min-width: 175px;
  }
  .step-card.conditional-card {
    background: #fafaf8;
    border-style: dashed;
    border-top-style: solid;
  }

  .step-num {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-pale);
    margin-bottom: 9px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .step-num-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .step-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: 8px;
  }
  .step-hint {
    font-size: 13px;
    color: var(--text-light);
    font-weight: 300;
    line-height: 1.45;
    margin-bottom: 10px;
  }
  .step-tools {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .tool-tag {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 2px;
    border: 1px solid var(--border);
    color: var(--text-light);
    background: var(--bg);
    letter-spacing: 0.2px;
  }

  /* ── Arrow ── */
  .flow-arrow {
    display: flex;
    align-items: center;
    padding: 0 7px;
    flex-shrink: 0;
    align-self: center;
    color: #ccc;
  }
  .flow-arrow svg { width: 18px; height: 18px; }

  /* ── Sub-flow ── */
  .sub-flow {
    margin-top: 12px;
    margin-left: 52px;
    padding-left: 22px;
    border-left: 2px dashed var(--border);
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
    row-gap: 10px;
  }
  .sub-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-pale);
    font-weight: 400;
    margin-right: 10px;
    white-space: nowrap;
  }

  /* ── Conditional indicator ── */
  .cond-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #b08030;
    background: #fef8f0;
    border: 1px solid #e8d0a0;
    padding: 1px 6px;
    border-radius: 2px;
    margin-left: auto;
    white-space: nowrap;
  }

  /* ══════════════════════════
     DETAIL DRAWER
  ══════════════════════════ */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(30,30,30,0.5);
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
    z-index: 90;
  }
  .overlay.open { opacity: 1; pointer-events: all; cursor: pointer; }

  .drawer {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 440px;
    background: var(--white);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    z-index: 100;
  }
  .drawer.open { transform: translateX(0); }

  .drawer-head {
    background: var(--nav);
    padding: 32px 36px 28px;
    position: relative;
    border-bottom: 4px solid var(--green);
  }
  .drawer-close {
    position: absolute; top: 18px; right: 18px;
    width: 32px; height: 32px;
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.5);
    border-radius: 2px;
    cursor: pointer;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .drawer-close:hover { border-color: var(--green); color: var(--green); }
  .drawer-krok {
    font-size: 12px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--green);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .drawer-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.25;
  }

  .drawer-body { padding: 30px 36px 48px; }
  .d-section {
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border-light);
  }
  .d-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .d-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green-dark);
    margin-bottom: 10px;
  }
  .d-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-mid);
    font-weight: 300;
  }
  .d-tools { display: flex; flex-wrap: wrap; gap: 6px; }
  .d-tool {
    font-size: 13px;
    padding: 5px 12px;
    background: var(--green-pale);
    border: 1px solid #b8ddb6;
    border-radius: 2px;
    color: var(--green-dark);
    font-weight: 500;
  }
  .d-warn {
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    border-left: 4px solid #e8a030;
    padding: 14px 16px;
    border-radius: 2px;
  }
  .d-warn-text { font-size: 14px; line-height: 1.7; color: var(--text-mid); }
  .d-note { font-size: 14px; color: var(--text-pale); font-style: italic; line-height: 1.65; }

  /* ── Responsible persons in drawer ── */
  .d-persons { display: flex; flex-wrap: wrap; gap: 6px; }
  .d-person {
    font-size: 13px;
    padding: 5px 12px;
    border-radius: 2px;
    font-weight: 500;
  }
  .d-person.katka { background: #e8f0f8; color: #3a6a9a; border: 1px solid #c0d4e8; }
  .d-person.lenka { background: #f8e8f0; color: #9a3a6a; border: 1px solid #e8c0d4; }
  .d-person.adam  { background: #e8f8f0; color: #3a9a6a; border: 1px solid #c0e8d4; }
  .d-person.ivo   { background: #f8f0e8; color: #9a6a3a; border: 1px solid #e8d4c0; }
  .d-person.simona { background: #f0f0f8; color: #5a5a9a; border: 1px solid #d0d0e8; }
  .d-person.ucetni { background: #f0f0f0; color: #5a5a5a; border: 1px solid #d0d0d0; }

  /* ══════════════════════════
     FOOTER STATS
  ══════════════════════════ */
  .stats-bar {
    background: var(--nav);
    padding: 28px 56px;
    display: flex;
    gap: 52px;
    flex-wrap: wrap;
    align-items: center;
  }
  .stat { display: flex; flex-direction: column; gap: 4px; }
  .stat-n {
    font-family: 'Libre Baskerville', serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--green);
    line-height: 1;
  }
  .stat-l {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #666;
    font-weight: 300;
  }
  .stat-div { width: 1px; height: 44px; background: #3a3a3a; }
  .stats-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .stats-logo-small { opacity: 0.25; width: 64px; }
  .stats-tagline { font-size: 13px; color: #666; font-weight: 300; line-height: 1.5; max-width: 220px; }

  /* ══════════════════════════
     TRANSITION
  ══════════════════════════ */
  .fade-enter {
    animation: fadeUp 0.35s ease forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ══════════════════════════
     GUIDE LAYOUT (platby)
  ══════════════════════════ */
  .guide-section {
    margin-bottom: 48px;
  }
  .guide-section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 6px;
  }
  .guide-section-icon {
    width: 46px; height: 46px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    color: white;
    flex-shrink: 0;
  }
  .guide-section-titles { flex: 1; }
  .guide-section-name {
    font-family: 'Libre Baskerville', serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .guide-section-sub {
    font-size: 13px;
    color: var(--text-pale);
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .guide-divider {
    height: 2px;
    margin: 14px 0 24px;
  }
  .guide-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .guide-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .guide-card:hover {
    box-shadow: 0 6px 20px rgba(0,0,0,0.10);
    transform: translateY(-3px);
  }
  .guide-card-top {
    padding: 6px 20px;
    color: white;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .guide-card-body {
    padding: 18px 20px 16px;
  }
  .guide-card-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .guide-card-desc {
    font-size: 14px;
    color: var(--text-mid);
    font-weight: 300;
    line-height: 1.65;
  }
  .guide-card-docs {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 12px;
  }
  .guide-doc-tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 2px;
    border: 1px solid var(--border);
    color: var(--text-light);
    background: var(--bg);
  }
  .guide-card-flow {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .flow-step-mini {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 500;
    white-space: nowrap;
  }
  .flow-step-mini.who  { background: #e8f0f8; color: #3a6a9a; }
  .flow-step-mini.doc  { background: #e8f5e7; color: #2d8829; }
  .flow-step-mini.send { background: #f8f0e8; color: #9a6a3a; }
  .flow-arrow-mini {
    color: #ccc;
    font-size: 14px;
  }

  @media (max-width: 860px) {
    .util-bar, header, main, .stats-bar { padding-left: 20px; padding-right: 20px; }
    .drawer { width: 100%; }
    .step-card { width: 175px; min-width: 160px; }
    .header-logo { display: none; }
    .phase-legend { display: none; }
    .nav-tab { padding: 0 14px; font-size: 13px; }
  }
</style>
</head>
<body>

<!-- UTILITY BAR -->
<div class="util-bar">
  <span>Showroom</span>
  <span>CZ&nbsp;&nbsp;EN&nbsp;&nbsp;DE</span>
  <span>CZK&nbsp;&nbsp;EUR</span>
</div>

<!-- NAV BAR -->
<div class="navbar">
  <div class="nav-logo-block">
    <div style="position:relative; width:140px; height:52px;">
      <svg style="position:absolute;top:0;left:0;width:140px;height:52px;" viewBox="0 0 140 52" fill="none">
        <path d="M 112 4 A 52 52 0 0 1 136 48" stroke="white" stroke-width="1.5"
              stroke-dasharray="2.5 4" stroke-linecap="round" opacity="0.7"/>
        <path d="M 136 48 A 8 8 0 0 1 118 52" stroke="white" stroke-width="2"
              stroke-linecap="round" opacity="0.9"/>
      </svg>
      <div style="position:absolute;top:3px;left:0;">

function arrow(color){
  return `<div class="flow-arrow" style="color:${color}88">
    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9h12M10 4l5 5-5 5"/>
    </svg>
  </div>`;
}

function card(s, isSub, phases){
  const ph = phases.find(p=>p.id===s.phase);
  const col = ph?.color || 'var(--green)';
  const isConditional = s.conditional;
  let cls = 'step-card';
  if(isSub) cls += ' sub-card';
  if(isConditional && !isSub) cls += ' conditional-card';

  let personsHtml = '';
  if(s.persons && s.persons.length > 0){
    personsHtml = s.persons.slice(0,2).map(p => {
      const cls = p.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,'').replace(/\./g,'');
      return `<span class="person-badge ${cls}">${p}</span>`;
    }).join('');
  }

  let condHtml = '';
  if(isConditional){
    condHtml = '<span class="cond-badge">podmíněný</span>';
  }

  return `<div class="${cls}"
    style="border-top-color:${col}"
    onclick="openDrawer('${s.id}')">
    <div class="step-num">
      <span class="step-num-dot" style="background:${col}"></span>
      KROK ${s.id}
      ${condHtml}
    </div>
    <div class="step-title">${s.title}</div>
    <div class="step-hint">${s.hint}</div>
    <div class="step-tools">
      ${s.tools.slice(0,2).map(t=>`<span class="tool-tag">${t}</span>`).join('')}
    </div>
    ${personsHtml ? '<div style="margin-top:4px">'+personsHtml+'</div>' : ''}
  </div>`;
}

function renderLegend(phases){
  const el = document.getElementById('phaseLegend');
  let html = '<div class="legend-title">Fáze procesu</div>';
  phases.forEach((ph,i) => {
    html += `<div class="legend-row"><div class="legend-pip" style="background:${ph.color}"></div>Fáze ${ph.id} — ${ph.name}</div>`;
  });
  el.innerHTML = html;
}

function renderStats(config){
  const el = document.getElementById('statsBar');
  let html = '';
  config.stats.forEach((st,i) => {
    html += `<div class="stat"><div class="stat-n">${st.n}</div><div class="stat-l">${st.l}</div></div>`;
    if(i < config.stats.length - 1) html += '<div class="stat-div"></div>';
  });
  html += `<div class="stats-right">
    <svg class="stats-logo-small" viewBox="0 0 180 120" fill="none">
      <text x="6" y="38"  font-family="Georgia,serif" font-size="22" fill="white" letter-spacing="0.5">KAMENICTVÍ</text>
      <text x="6" y="68"  font-family="Georgia,serif" font-size="28" fill="white" letter-spacing="0.5">METAL</text>
      <text x="6" y="102" font-family="Georgia,serif" font-size="34" font-weight="bold" fill="white" letter-spacing="0.5">GRANIT</text>
      <path d="M 142 8 A 62 62 0 0 1 174 112" stroke="white" stroke-width="2" stroke-dasharray="3 5" stroke-linecap="round"/>
      <path d="M 174 112 A 12 12 0 0 1 150 118" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div class="stats-tagline">${config.tagline}</div>
  </div>`;
  el.innerHTML = html;
}

function renderGuide(){
  const config = PROCESSES[currentProcess];
  const sections = config.sections;
  const main = document.getElementById('main');

  const totalItems = sections.reduce((n,s)=>n+s.items.length,0);
  const sub = `${totalItems} variant &middot; ${sections.length} kategorie &middot; klikněte na kartu pro zobrazení detailu`;

  document.getElementById('headerTitle').innerHTML = config.title;
  document.getElementById('headerSub').innerHTML = sub;
  document.getElementById('navLabel').innerHTML = config.navLabel;

  // legend for guide
  const legendEl = document.getElementById('phaseLegend');
  let legendHtml = '<div class="legend-title">Kategorie</div>';
  sections.forEach(sec => {
    legendHtml += `<div class="legend-row"><div class="legend-pip" style="background:${sec.color}"></div>${sec.name}</div>`;
  });
  legendEl.innerHTML = legendHtml;

  renderStats(config);

  let html = '';
  sections.forEach(sec => {
    html += `<div class="guide-section">
      <div class="guide-section-header">
        <div class="guide-section-icon" style="background:${sec.color}">${sec.icon}</div>
        <div class="guide-section-titles">
          <div class="guide-section-name">${sec.name}</div>
          <div class="guide-section-sub">${sec.sub}</div>
        </div>
      </div>
      <div class="guide-divider" style="background:linear-gradient(to right,${sec.color}60 80px,var(--border-light) 80px)"></div>
      <div class="guide-cards">`;
    sec.items.forEach(item => {
      const flowHtml = item.flow.map((f,i) => {
        let out = `<span class="flow-step-mini ${f.type}">${f.text}</span>`;
        if(i < item.flow.length - 1) out += '<span class="flow-arrow-mini">→</span>';
        return out;
      }).join('');

      html += `<div class="guide-card" onclick="openGuideDrawer('${sec.id}','${item.id}')">
        <div class="guide-card-top" style="background:${item.color}">${item.title}</div>
        <div class="guide-card-body">
          <div class="guide-card-desc">${item.desc.split('\n')[0]}</div>
          <div class="guide-card-docs">
            ${item.docs.map(d=>`<span class="guide-doc-tag">${d}</span>`).join('')}
          </div>
          <div class="guide-card-flow">${flowHtml}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  main.innerHTML = html;
  main.classList.remove('fade-enter');
  void main.offsetWidth;
  main.classList.add('fade-enter');
}

function render(){
  const config = PROCESSES[currentProcess];

  if(config.type === 'guide'){
    renderGuide();
    return;
  }

  const phases = config.phases;
  const steps  = config.steps;
  const main   = document.getElementById('main');
  let html = '';

  // count main steps
  const mainSteps = steps.filter(s => !s.subOf);
  const sub = `${mainSteps.length} kroků &middot; ${phases.length} fáze &middot; klikněte na krok pro zobrazení detailu`;

  document.getElementById('headerTitle').innerHTML = config.title;
  document.getElementById('headerSub').innerHTML = sub;
  document.getElementById('navLabel').innerHTML = config.navLabel;

  renderLegend(phases);
  renderStats(config);

  phases.forEach(ph => {
    const mains = steps.filter(s=>s.phase===ph.id&&!s.subOf);
    const subs  = steps.filter(s=>s.phase===ph.id&&s.subOf);
    html += `<div class="phase-block">
      <div class="phase-header">
        <div class="phase-num-badge" style="background:${ph.color}">0${ph.id}</div>
        <div class="phase-titles">
          <div class="phase-name">${ph.name}</div>
          <div class="phase-sub">${ph.sub}</div>
        </div>
      </div>
      <div class="phase-divider" style="background:linear-gradient(to right,${ph.color}60 80px,var(--border-light) 80px)"></div>
      <div class="flow-row">`;
    mains.forEach((s,i)=>{
      html += card(s,false,phases);
      if(i < mains.length-1) html += arrow(ph.color);
    });
    html += `</div>`;
    subs.forEach(sub=>{
      const parent = steps.find(s=>s.id===sub.subOf);
      html += `<div class="sub-flow">
        <span class="sub-label">↳ varianta: ${(parent?.title||'').substring(0,28)}…</span>
        ${card(sub,true,phases)}
      </div>`;
    });
    html += `</div>`;
  });

  main.innerHTML = html;
  main.classList.remove('fade-enter');
  void main.offsetWidth; // reflow
  main.classList.add('fade-enter');
}

function openDrawer(id){
  const config = PROCESSES[currentProcess];
  const steps  = config.steps;
  const phases = config.phases;
  const s = steps.find(x=>String(x.id)===String(id));
  if(!s) return;
  const ph = phases.find(p=>p.id===s.phase);
  document.getElementById('dKrok').textContent = `Krok ${s.id}  ·  ${ph?.name||''}`;
  document.getElementById('dTitle').textContent = s.title;
  let b = `
    <div class="d-section">
      <div class="d-label">Popis</div>
      <div class="d-text">${s.desc.replace(/\n/g,'<br>')}</div>
    </div>`;

  // Persons (drobná zakázka)
  if(s.persons && s.persons.length > 0){
    b += `<div class="d-section">
      <div class="d-label">Zodpovědné osoby</div>
      <div class="d-persons">${s.persons.map(p => {
        const cls = p.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,'').replace(/\./g,'');
        return `<span class="d-person ${cls}">${p}</span>`;
      }).join('')}</div>
    </div>`;
  }

  b += `<div class="d-section">
      <div class="d-label">Nástroje &amp; systémy</div>
      <div class="d-tools">${s.tools.map(t=>`<span class="d-tool">${t}</span>`).join('')}</div>
    </div>`;
  if(s.warn) b += `
    <div class="d-section">
      <div class="d-label">⚠ Možné problémy</div>
      <div class="d-warn"><div class="d-warn-text">${s.warn}</div></div>
    </div>`;
  if(s.note) b += `
    <div class="d-section">
      <div class="d-label">Poznámky</div>
      <div class="d-note">${s.note}</div>
    </div>`;
  if(s.conditional) b += `
    <div class="d-section">
      <div class="d-label">Podmínka</div>
      <div class="d-note">Tento krok se provádí pouze za určitých podmínek — viz popis výše.</div>
    </div>`;

  document.getElementById('dBody').innerHTML = b;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function openGuideDrawer(secId, itemId){
  const sec = PLATBY_SECTIONS.find(s=>s.id===secId);
  if(!sec) return;
  const item = sec.items.find(i=>i.id===itemId);
  if(!item) return;

  document.getElementById('dKrok').textContent = sec.name;
  document.getElementById('dTitle').textContent = item.title;

  const flowHtml = item.flow.map((f,i) => {
    let out = `<span class="flow-step-mini ${f.type}">${f.text}</span>`;
    if(i < item.flow.length - 1) out += '<span class="flow-arrow-mini">→</span>';
    return out;
  }).join('');

  let b = `
    <div class="d-section">
      <div class="d-label">Popis</div>
      <div class="d-text">${item.desc.replace(/\n/g,'<br>')}</div>
    </div>
    <div class="d-section">
      <div class="d-label">Účetní doklady</div>
      <div class="d-tools">${item.docs.map(d=>`<span class="d-tool">${d}</span>`).join('')}</div>
    </div>
    <div class="d-section">
      <div class="d-label">Postup</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">
        ${flowHtml}
      </div>
    </div>`;

  document.getElementById('dBody').innerHTML = b;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function switchProcess(key){
  if(key === currentProcess) return;
  closeDrawer();
  currentProcess = key;

  // Update tabs
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.process === key);
  });

  render();

  // Scroll to top smoothly
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// Initial render
render();
</script>
</body>
</html>
